<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kowri – Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{--amber:#f59e0b;--amber-dark:#d97706;--bg:#0d0d0d;--sidebar:#111;--card:#181818;--text:#fafafa;--muted:#9ca3af;--border:rgba(255,255,255,0.07);--radius:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* SIDEBAR */
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
.sb-logo{display:flex;align-items:center;gap:10px;padding:22px 20px;border-bottom:1px solid var(--border);}
.sb-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--amber-dark),var(--amber));border-radius:7px;display:flex;align-items:center;justify-content:center;}
.sb-logo-text{font-family:'Sora',sans-serif;font-weight:800;font-size:16px;color:var(--amber);}
.sb-nav{padding:16px 10px;flex:1;}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);transition:all .2s;margin-bottom:3px;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.sb-item:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.sb-item.active{background:rgba(245,158,11,0.12);color:var(--amber);}
.sb-item i{width:18px;text-align:center;font-size:15px;}
.sb-footer{padding:16px 10px;border-top:1px solid var(--border);}
.sb-admin{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.sb-avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--amber-dark),var(--amber));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:800;font-size:12px;color:#000;}
.sb-name{font-size:13px;font-weight:600;}
.btn-logout{width:100%;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:9px;color:#fca5a5;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;margin-top:8px;}
.btn-logout:hover{background:rgba(239,68,68,0.15);}

/* MAIN */
.main{margin-left:240px;flex:1;min-height:100vh;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--sidebar);position:sticky;top:0;z-index:50;}
.top-bar h1{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;}
.top-badge{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:var(--amber);font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;}
.content{padding:28px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.stat-card .sc-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.stat-card .sc-val{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px;}
.stat-card .sc-label{font-size:13px;color:var(--muted);}
.stat-card.amber .sc-icon{background:rgba(245,158,11,0.15);}
.stat-card.amber .sc-val{color:var(--amber);}
.stat-card.green .sc-icon{background:rgba(34,197,94,0.12);}
.stat-card.green .sc-val{color:#22c55e;}
.stat-card.red .sc-icon{background:rgba(239,68,68,0.12);}
.stat-card.red .sc-val{color:#ef4444;}
.stat-card.blue .sc-icon{background:rgba(59,130,246,0.12);}
.stat-card.blue .sc-val{color:#3b82f6;}

/* SECTION TABS */
.section-tabs{display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content;}
.stab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif;}
.stab.active{background:var(--amber);color:#000;}

/* TABLE */
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
.table-head h2{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:8px 12px;}
.search-box input{background:none;border:none;color:var(--text);font-size:13px;outline:none;width:200px;font-family:'DM Sans',sans-serif;}
.search-box input::placeholder{color:#4b5563;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;color:var(--muted);padding:12px 16px;background:rgba(255,255,255,0.03);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
td{padding:14px 16px;font-size:13px;border-top:1px solid var(--border);}
tr.clickable-row{cursor:pointer;transition:background .15s;}
tr.clickable-row:hover td{background:rgba(245,158,11,0.05);}
tr.clickable-row:hover td:first-child{border-left:2px solid var(--amber);}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;}
.badge.PENDING{background:rgba(245,158,11,0.15);color:var(--amber);}
.badge.APPROVED{background:rgba(34,197,94,0.12);color:#22c55e;}
.badge.REJECTED{background:rgba(239,68,68,0.12);color:#ef4444;}
.action-btns{display:flex;gap:6px;}
.btn-approve{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);color:#22c55e;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-approve:hover{background:rgba(34,197,94,0.2);}
.btn-reject{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#ef4444;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-reject:hover{background:rgba(239,68,68,0.15);}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:36px 0;}
.loading{text-align:center;color:var(--muted);font-size:14px;padding:36px 0;}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-size:14px;font-weight:600;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:rgba(34,197,94,0.4);color:#22c55e;}
.toast.error{border-color:rgba(239,68,68,0.4);color:#ef4444;}

/* ── DETAIL DRAWER ─────────────────────────────────────────── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background .3s;}
.drawer-overlay.open{background:rgba(0,0,0,0.6);pointer-events:all;}
.drawer{position:fixed;top:0;right:0;width:440px;max-width:100vw;height:100vh;background:#141414;border-left:1px solid var(--border);z-index:201;transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.drawer.open{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0;}
.drawer-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;}
.drawer-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;}
.drawer-close:hover{background:rgba(255,255,255,0.06);color:var(--text);}
.drawer-body{flex:1;overflow-y:auto;padding:24px;}
.drawer-body::-webkit-scrollbar{width:4px;}
.drawer-body::-webkit-scrollbar-track{background:transparent;}
.drawer-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.drawer-section{margin-bottom:24px;}
.drawer-section-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.detail-item{background:#1c1c1c;border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.detail-item.full{grid-column:1/-1;}
.detail-item .di-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.detail-item .di-val{font-size:13px;font-weight:600;color:var(--text);word-break:break-all;}
.detail-item .di-val.mono{font-family:'Courier New',monospace;font-size:12px;color:#a5b4fc;}
.detail-item .di-val.amber{color:var(--amber);font-family:'Sora',sans-serif;font-size:16px;font-weight:800;}
.detail-item .di-val.green{color:#22c55e;font-family:'Sora',sans-serif;font-size:16px;font-weight:800;}

/* Proof image in drawer */
.proof-thumb-wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;group:hover;}
.proof-thumb-wrap img{width:100%;display:block;object-fit:cover;max-height:200px;transition:opacity .2s;}
.proof-thumb-wrap:hover img{opacity:.85;}
.proof-zoom-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s;pointer-events:none;}
.proof-thumb-wrap:hover .proof-zoom-overlay{background:rgba(0,0,0,0.35);}
.proof-zoom-overlay i{color:#fff;font-size:22px;opacity:0;transform:scale(0.8);transition:all .2s;}
.proof-thumb-wrap:hover .proof-zoom-overlay i{opacity:1;transform:scale(1);}
.no-proof{background:#1c1c1c;border:1px dashed rgba(255,255,255,0.12);border-radius:10px;padding:28px;text-align:center;color:var(--muted);font-size:13px;}

/* Drawer footer actions */
.drawer-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;}
.drawer-footer .btn-approve,.drawer-footer .btn-reject{flex:1;padding:11px;font-size:13px;border-radius:9px;justify-content:center;display:flex;align-items:center;gap:6px;}

/* ── FULLSCREEN IMAGE VIEWER ───────────────────────────────── */
.img-fullscreen{position:fixed;inset:0;background:#000;z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;}
.img-fullscreen.open{display:flex;}
.img-fullscreen-img{max-width:100vw;max-height:100vh;object-fit:contain;transition:transform .35s cubic-bezier(.4,0,.2,1);transform-origin:center center;}
.img-fullscreen-img.minimized{max-width:40vw;max-height:40vh;}
.img-fs-controls{position:fixed;top:16px;right:16px;display:flex;gap:8px;z-index:1000;}
.img-fs-btn{width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.img-fs-btn:hover{background:rgba(255,255,255,0.12);}
.img-fs-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,0.4);pointer-events:none;}

@media(max-width:1024px){.stats-grid{grid-template-columns:1fr 1fr;}.sidebar{display:none;}.main{margin-left:0;}.drawer{width:100vw;}}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr;}.content{padding:16px;}.top-bar{padding:14px 16px;}.search-box input{width:120px;}.detail-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon"><i class="fa-solid fa-user-shield" style="color:#000;font-size:14px;"></i></div>
    <span class="sb-logo-text">Admin Panel</span>
  </div>
  <div class="sb-nav">
    <button class="sb-item active" onclick="showSection('overview',this)"><i class="fa-solid fa-gauge"></i> Overview</button>
    <button class="sb-item" onclick="showSection('deposits',this)"><i class="fa-solid fa-arrow-down-to-line"></i> Deposits</button>
    <button class="sb-item" onclick="showSection('withdrawals',this)"><i class="fa-solid fa-arrow-up-from-line"></i> Withdrawals</button>
  </div>
  <div class="sb-footer">
    <div class="sb-admin">
      <div class="sb-avatar" id="admin-avatar">A</div>
      <span class="sb-name" id="admin-name">Admin</span>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
  </div>
</aside>

<main class="main">
  <div class="top-bar">
    <h1 id="page-title">Overview</h1>
    <span class="top-badge"><i class="fa-solid fa-shield-halved"></i> Admin</span>
  </div>
  <div class="content">

    <!-- OVERVIEW -->
    <div id="sec-overview">
      <div class="stats-grid">
        <div class="stat-card amber">
          <div class="sc-icon"><i class="fa-solid fa-hourglass-half" style="color:var(--amber);font-size:16px;"></i></div>
          <div class="sc-val" id="stat-pending-dep">—</div>
          <div class="sc-label">Pending Deposits</div>
        </div>
        <div class="stat-card green">
          <div class="sc-icon"><i class="fa-solid fa-circle-check" style="color:#22c55e;font-size:16px;"></i></div>
          <div class="sc-val" id="stat-approved-dep">—</div>
          <div class="sc-label">Approved Deposits</div>
        </div>
        <div class="stat-card blue">
          <div class="sc-icon"><i class="fa-solid fa-clock" style="color:#3b82f6;font-size:16px;"></i></div>
          <div class="sc-val" id="stat-pending-wit">—</div>
          <div class="sc-label">Pending Withdrawals</div>
        </div>
        <div class="stat-card red">
          <div class="sc-icon"><i class="fa-solid fa-circle-xmark" style="color:#ef4444;font-size:16px;"></i></div>
          <div class="sc-val" id="stat-rejected">—</div>
          <div class="sc-label">Rejected (Total)</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;">
          <h3 style="font-family:'Sora',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;color:var(--amber);">Recent Deposits</h3>
          <div id="recent-deposits-list"><div class="loading" style="padding:16px 0;"><i class="fa-solid fa-circle-notch fa-spin"></i></div></div>
        </div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;">
          <h3 style="font-family:'Sora',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;color:#3b82f6;">Recent Withdrawals</h3>
          <div id="recent-withdrawals-list"><div class="loading" style="padding:16px 0;"><i class="fa-solid fa-circle-notch fa-spin"></i></div></div>
        </div>
      </div>
    </div>

    <!-- DEPOSITS -->
    <div id="sec-deposits" style="display:none;">
      <div class="section-tabs">
        <button class="stab active" onclick="filterDep('ALL',this)">All</button>
        <button class="stab" onclick="filterDep('PENDING',this)">Pending</button>
        <button class="stab" onclick="filterDep('APPROVED',this)">Approved</button>
        <button class="stab" onclick="filterDep('REJECTED',this)">Rejected</button>
      </div>
      <div class="table-card">
        <div class="table-head">
          <h2>Deposits <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:6px;">Click any row for details</span></h2>
          <div class="search-box"><i class="fa-solid fa-search" style="color:#4b5563;font-size:12px;"></i><input type="text" placeholder="Search deposits..." oninput="searchDep(this.value)"/></div>
        </div>
        <div id="dep-table-wrap"><div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</div></div>
      </div>
    </div>

    <!-- WITHDRAWALS -->
    <div id="sec-withdrawals" style="display:none;">
      <div class="section-tabs">
        <button class="stab active" onclick="filterWit('ALL',this)">All</button>
        <button class="stab" onclick="filterWit('PENDING',this)">Pending</button>
        <button class="stab" onclick="filterWit('APPROVED',this)">Approved</button>
        <button class="stab" onclick="filterWit('REJECTED',this)">Rejected</button>
      </div>
      <div class="table-card">
        <div class="table-head">
          <h2>Withdrawals <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:6px;">Click any row for details</span></h2>
          <div class="search-box"><i class="fa-solid fa-search" style="color:#4b5563;font-size:12px;"></i><input type="text" placeholder="Search withdrawals..." oninput="searchWit(this.value)"/></div>
        </div>
        <div id="wit-table-wrap"><div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</div></div>
      </div>
    </div>

  </div>
</main>

<!-- ══ DETAIL DRAWER ══ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detail-drawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawer-title">Transaction Details</span>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer" id="drawer-footer"></div>
</div>

<!-- ══ FULLSCREEN IMAGE VIEWER ══ -->
<div class="img-fullscreen" id="img-fullscreen">
  <div class="img-fs-controls">
    <button class="img-fs-btn" id="img-toggle-btn" onclick="toggleImgSize()" title="Minimize / Expand">
      <i class="fa-solid fa-compress" id="img-toggle-icon"></i>
    </button>
    <button class="img-fs-btn" onclick="closeFullscreen()" title="Close">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <img src="" id="fs-img" class="img-fullscreen-img" alt="Proof"/>
  <div class="img-fs-hint">Press <kbd style="background:rgba(255,255,255,0.1);padding:1px 6px;border-radius:4px;font-size:11px;">Esc</kbd> to close</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://kowriwebbackend.onrender.com';
let allDeposits = [], allWithdrawals = [];
let depFilter = 'ALL', depSearch = '';
let witFilter = 'ALL', witSearch = '';
let currentDrawerType = null, currentDrawerId = null;
let imgMinimized = false;

// ── Utilities ──────────────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('kowri_admin_token');
  localStorage.removeItem('kowri_admin');
  localStorage.removeItem('kowri_admin_refresh');
  location.href = 'admin-login.html';
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

function fmt(amt) { return 'GH₵ ' + parseFloat(amt||0).toFixed(2); }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(d) { return new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

function showSection(name, el) {
  ['overview','deposits','withdrawals'].forEach(s => {
    document.getElementById('sec-'+s).style.display = 'none';
  });
  document.getElementById('sec-'+name).style.display = 'block';
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-title').textContent = name.charAt(0).toUpperCase()+name.slice(1);
  closeDrawer();
}

// ── Filters ────────────────────────────────────────────────────────────
function filterDep(status, el) {
  depFilter = status;
  el.closest('.section-tabs').querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderDep();
}
function filterWit(status, el) {
  witFilter = status;
  el.closest('.section-tabs').querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderWit();
}
function searchDep(q) { depSearch = q.toLowerCase(); renderDep(); }
function searchWit(q) { witSearch = q.toLowerCase(); renderWit(); }

// ── Render Tables ──────────────────────────────────────────────────────
function renderDep() {
  let items = allDeposits;
  if (depFilter !== 'ALL') items = items.filter(d => d.status === depFilter);
  if (depSearch) items = items.filter(d =>
    (d.tokenId||'').toLowerCase().includes(depSearch) ||
    (d.walletId||'').toLowerCase().includes(depSearch) ||
    (d.amount+'').includes(depSearch)
  );
  const wrap = document.getElementById('dep-table-wrap');
  if (!items.length) { wrap.innerHTML = '<div class="empty">No deposits found.</div>'; return; }
  wrap.innerHTML = `<table>
    <thead><tr><th>Date</th><th>Token ID</th><th>Wallet ID</th><th>Amount</th><th>Reward</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>
    ${items.map(d => `<tr class="clickable-row" onclick="openDepositDrawer('${d.id}')">
      <td>${fmtDate(d.createdAt)}</td>
      <td style="font-family:'Sora',sans-serif;font-weight:600;">${d.tokenId||'—'}</td>
      <td style="color:var(--muted);font-size:12px;">${d.walletId||'—'}</td>
      <td style="font-family:'Sora',sans-serif;font-weight:700;">${fmt(d.amount)}</td>
      <td style="color:#22c55e;font-weight:600;">${d.rewardAmount ? fmt(d.rewardAmount) : '—'}</td>
      <td><span class="badge ${d.status}">${d.status}</span></td>
      <td onclick="event.stopPropagation()"><div class="action-btns">
        ${d.status === 'PENDING' ? `
          <button class="btn-approve" onclick="updateDep('${d.id}','APPROVED')"><i class="fa-solid fa-check"></i> Approve</button>
          <button class="btn-reject" onclick="updateDep('${d.id}','REJECTED')"><i class="fa-solid fa-xmark"></i> Reject</button>
        ` : `<span style="color:#4b5563;font-size:12px;">${d.status}</span>`}
      </div></td>
    </tr>`).join('')}
    </tbody></table>`;
}

function renderWit() {
  let items = allWithdrawals;
  if (witFilter !== 'ALL') items = items.filter(w => w.status === witFilter);
  if (witSearch) items = items.filter(w =>
    (w.accountName||'').toLowerCase().includes(witSearch) ||
    (w.accountNumber||'').toLowerCase().includes(witSearch) ||
    (w.networkProvider||'').toLowerCase().includes(witSearch) ||
    (w.amount+'').includes(witSearch)
  );
  const wrap = document.getElementById('wit-table-wrap');
  if (!items.length) { wrap.innerHTML = '<div class="empty">No withdrawals found.</div>'; return; }
  wrap.innerHTML = `<table>
    <thead><tr><th>Date</th><th>Account Name</th><th>Network</th><th>Account #</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>
    ${items.map(w => `<tr class="clickable-row" onclick="openWithdrawalDrawer('${w.id}')">
      <td>${fmtDate(w.createdAt)}</td>
      <td style="font-weight:600;">${w.accountName||'—'}</td>
      <td>${w.networkProvider||'—'}</td>
      <td style="font-family:monospace;font-size:12px;">${w.accountNumber||'—'}</td>
      <td style="font-family:'Sora',sans-serif;font-weight:700;">${fmt(w.amount)}</td>
      <td><span class="badge ${w.status}">${w.status}</span></td>
      <td onclick="event.stopPropagation()"><div class="action-btns">
        ${w.status === 'PENDING' ? `
          <button class="btn-approve" onclick="updateWit('${w.id}','APPROVED')"><i class="fa-solid fa-check"></i> Approve</button>
          <button class="btn-reject" onclick="updateWit('${w.id}','REJECTED')"><i class="fa-solid fa-xmark"></i> Reject</button>
        ` : `<span style="color:#4b5563;font-size:12px;">${w.status}</span>`}
      </div></td>
    </tr>`).join('')}
    </tbody></table>`;
}

// ── Drawer: Deposit ────────────────────────────────────────────────────
function openDepositDrawer(id) {
  const d = allDeposits.find(x => x.id === id);
  if (!d) return;
  currentDrawerType = 'deposit';
  currentDrawerId = id;

  document.getElementById('drawer-title').textContent = 'Deposit Details';

  const proofHtml = d.proofImageUrl
    ? `<div class="proof-thumb-wrap" onclick="openFullscreen('${d.proofImageUrl}')">
        <img src="${d.proofImageUrl}" alt="Proof of payment" loading="lazy"/>
        <div class="proof-zoom-overlay"><i class="fa-solid fa-expand"></i></div>
       </div>
       <p style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center;">Click image to view full screen</p>`
    : `<div class="no-proof"><i class="fa-solid fa-image" style="font-size:20px;margin-bottom:8px;display:block;"></i>No proof image uploaded</div>`;

  const userSection = d.userFullName ? `
    <div class="drawer-section">
      <div class="drawer-section-label">User Info</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="di-label">Full Name</div><div class="di-val">${d.userFullName||'—'}</div></div>
        <div class="detail-item"><div class="di-label">Email</div><div class="di-val" style="font-size:12px;">${d.userEmail||'—'}</div></div>
        <div class="detail-item full"><div class="di-label">User Balance</div><div class="di-val green">${fmt(d.userBalance)}</div></div>
      </div>
    </div>` : '';

  document.getElementById('drawer-body').innerHTML = `
    ${userSection}
    <div class="drawer-section">
      <div class="drawer-section-label">Transaction Info</div>
      <div class="detail-grid">
        <div class="detail-item full">
          <div class="di-label">Transaction ID</div>
          <div class="di-val mono">${d.id||'—'}</div>
        </div>
        <div class="detail-item full">
          <div class="di-label">Token ID</div>
          <div class="di-val mono">${d.tokenId||'—'}</div>
        </div>
        <div class="detail-item full">
          <div class="di-label">Secret Code / Key</div>
          <div class="di-val" style="font-family:'Courier New',monospace;font-size:13px;color:#fbbf24;letter-spacing:0.05em;">${d.secretCode||'—'}</div>
        </div>
        <div class="detail-item full">
          <div class="di-label">Wallet ID</div>
          <div class="di-val mono">${d.walletId||'—'}</div>
        </div>
        <div class="detail-item">
          <div class="di-label">Deposit Amount</div>
          <div class="di-val amber">${fmt(d.amount)}</div>
        </div>
        <div class="detail-item">
          <div class="di-label">Reward Credited</div>
          <div class="di-val green">${d.rewardAmount ? fmt(d.rewardAmount) : '—'}</div>
        </div>
        <div class="detail-item">
          <div class="di-label">Status</div>
          <div class="di-val"><span class="badge ${d.status}">${d.status}</span></div>
        </div>
        <div class="detail-item">
          <div class="di-label">Submitted</div>
          <div class="di-val" style="font-size:12px;">${fmtDateTime(d.createdAt)}</div>
        </div>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-label">Proof of Payment</div>
      ${proofHtml}
    </div>`;

  renderDrawerFooter('deposit', d.status, id);
  openDrawer();
}

// ── Drawer: Withdrawal ─────────────────────────────────────────────────
function openWithdrawalDrawer(id) {
  const w = allWithdrawals.find(x => x.id === id);
  if (!w) return;
  currentDrawerType = 'withdrawal';
  currentDrawerId = id;

  document.getElementById('drawer-title').textContent = 'Withdrawal Details';

  const userSection = w.userFullName ? `
    <div class="drawer-section">
      <div class="drawer-section-label">User Info</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="di-label">Full Name</div><div class="di-val">${w.userFullName||'—'}</div></div>
        <div class="detail-item"><div class="di-label">Email</div><div class="di-val" style="font-size:12px;">${w.userEmail||'—'}</div></div>
        <div class="detail-item full"><div class="di-label">User Balance</div><div class="di-val green">${fmt(w.userBalance)}</div></div>
      </div>
    </div>` : '';

  document.getElementById('drawer-body').innerHTML = `
    ${userSection}
    <div class="drawer-section">
      <div class="drawer-section-label">Withdrawal Info</div>
      <div class="detail-grid">
        <div class="detail-item full">
          <div class="di-label">Transaction ID</div>
          <div class="di-val mono">${w.id||'—'}</div>
        </div>
        <div class="detail-item">
          <div class="di-label">Account Name</div>
          <div class="di-val">${w.accountName||'—'}</div>
        </div>
        <div class="detail-item">
          <div class="di-label">Network Provider</div>
          <div class="di-val">${w.networkProvider||'—'}</div>
        </div>
        <div class="detail-item full">
          <div class="di-label">Account Number</div>
          <div class="di-val mono" style="font-size:15px;letter-spacing:0.08em;">${w.accountNumber||'—'}</div>
        </div>
        <div class="detail-item">
          <div class="di-label">Amount</div>
          <div class="di-val amber">${fmt(w.amount)}</div>
        </div>
        <div class="detail-item">
          <div class="di-label">Agent Service</div>
          <div class="di-val" style="color:var(--muted);">${w.agentService||'—'}</div>
        </div>
        <div class="detail-item">
          <div class="di-label">Status</div>
          <div class="di-val"><span class="badge ${w.status}">${w.status}</span></div>
        </div>
        <div class="detail-item">
          <div class="di-label">Submitted</div>
          <div class="di-val" style="font-size:12px;">${fmtDateTime(w.createdAt)}</div>
        </div>
        <div class="detail-item full">
          <div class="di-label">Last Updated</div>
          <div class="di-val" style="font-size:12px;">${fmtDateTime(w.updatedAt)}</div>
        </div>
      </div>
    </div>`;

  renderDrawerFooter('withdrawal', w.status, id);
  openDrawer();
}

function renderDrawerFooter(type, status, id) {
  const footer = document.getElementById('drawer-footer');
  if (status === 'PENDING') {
    footer.innerHTML = `
      <button class="btn-approve" onclick="${type==='deposit'?`updateDep('${id}','APPROVED')`:`updateWit('${id}','APPROVED')`}">
        <i class="fa-solid fa-check"></i> Approve
      </button>
      <button class="btn-reject" onclick="${type==='deposit'?`updateDep('${id}','REJECTED')`:`updateWit('${id}','REJECTED')`}">
        <i class="fa-solid fa-xmark"></i> Reject
      </button>`;
    footer.style.display = 'flex';
  } else {
    footer.innerHTML = '';
    footer.style.display = 'none';
  }
}

function openDrawer() {
  document.getElementById('detail-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('detail-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ── Fullscreen Image ───────────────────────────────────────────────────
function openFullscreen(url) {
  const fs = document.getElementById('img-fullscreen');
  const img = document.getElementById('fs-img');
  img.src = url;
  img.classList.remove('minimized');
  imgMinimized = false;
  document.getElementById('img-toggle-icon').className = 'fa-solid fa-compress';
  document.getElementById('img-toggle-btn').title = 'Minimize image';
  fs.style.display = 'flex';
}

function closeFullscreen() {
  document.getElementById('img-fullscreen').style.display = 'none';
  document.getElementById('fs-img').src = '';
}

function toggleImgSize() {
  const img = document.getElementById('fs-img');
  const icon = document.getElementById('img-toggle-icon');
  const btn = document.getElementById('img-toggle-btn');
  if (imgMinimized) {
    img.classList.remove('minimized');
    icon.className = 'fa-solid fa-compress';
    btn.title = 'Minimize image';
    imgMinimized = false;
  } else {
    img.classList.add('minimized');
    icon.className = 'fa-solid fa-expand';
    btn.title = 'Expand image';
    imgMinimized = true;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('img-fullscreen').style.display === 'flex') {
      closeFullscreen();
    } else {
      closeDrawer();
    }
  }
});

// ── Overview ───────────────────────────────────────────────────────────
function renderOverview() {
  const pd = allDeposits.filter(d => d.status === 'PENDING').length;
  const ad = allDeposits.filter(d => d.status === 'APPROVED').length;
  const pw = allWithdrawals.filter(w => w.status === 'PENDING').length;
  const rej = allDeposits.filter(d => d.status === 'REJECTED').length + allWithdrawals.filter(w => w.status === 'REJECTED').length;
  document.getElementById('stat-pending-dep').textContent = pd;
  document.getElementById('stat-approved-dep').textContent = ad;
  document.getElementById('stat-pending-wit').textContent = pw;
  document.getElementById('stat-rejected').textContent = rej;

  const recentDep = [...allDeposits].sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).slice(0,4);
  const recentWit = [...allWithdrawals].sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).slice(0,4);

  document.getElementById('recent-deposits-list').innerHTML = recentDep.length ?
    recentDep.map(d => `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="showSection('deposits',document.querySelectorAll('.sb-item')[1])">
      <div><div style="font-size:13px;font-weight:600;">${d.tokenId||'—'}</div><div style="font-size:11px;color:var(--muted);">${fmtDate(d.createdAt)}</div></div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="font-family:'Sora',sans-serif;font-weight:700;font-size:13px;">${fmt(d.amount)}</span><span class="badge ${d.status}" style="font-size:10px;">${d.status}</span></div>
    </div>`).join('') : '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No deposits yet.</div>';

  document.getElementById('recent-withdrawals-list').innerHTML = recentWit.length ?
    recentWit.map(w => `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
      <div><div style="font-size:13px;font-weight:600;">${w.accountName||'—'}</div><div style="font-size:11px;color:var(--muted);">${fmtDate(w.createdAt)} · ${w.networkProvider||''}</div></div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="font-family:'Sora',sans-serif;font-weight:700;font-size:13px;">${fmt(w.amount)}</span><span class="badge ${w.status}" style="font-size:10px;">${w.status}</span></div>
    </div>`).join('') : '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No withdrawals yet.</div>';
}

// ── API Actions ────────────────────────────────────────────────────────
async function updateDep(id, status) {
  const token = localStorage.getItem('kowri_admin_token');
  try {
    const res = await fetch(`${API}/api/admin/deposits/${id}/status?status=${status}`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('Failed');
    const idx = allDeposits.findIndex(d => d.id === id);
    if (idx > -1) allDeposits[idx].status = status;
    renderDep(); renderOverview();
    // Refresh drawer if open
    if (currentDrawerType === 'deposit' && currentDrawerId === id) {
      openDepositDrawer(id);
    }
    toast(`Deposit ${status.toLowerCase()} successfully`, status === 'APPROVED' ? 'success' : 'error');
  } catch(e) { toast('Action failed: ' + e.message, 'error'); }
}

async function updateWit(id, status) {
  const token = localStorage.getItem('kowri_admin_token');
  try {
    const res = await fetch(`${API}/api/admin/withdrawals/${id}/status?status=${status}`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('Failed');
    const idx = allWithdrawals.findIndex(w => w.id === id);
    if (idx > -1) allWithdrawals[idx].status = status;
    renderWit(); renderOverview();
    if (currentDrawerType === 'withdrawal' && currentDrawerId === id) {
      openWithdrawalDrawer(id);
    }
    toast(`Withdrawal ${status.toLowerCase()} successfully`, status === 'APPROVED' ? 'success' : 'error');
  } catch(e) { toast('Action failed: ' + e.message, 'error'); }
}

// ── Init ───────────────────────────────────────────────────────────────
async function init() {
  const stored = localStorage.getItem('kowri_admin');
  const token = localStorage.getItem('kowri_admin_token');
  if (!stored || !token) { location.href = 'admin-login.html'; return; }

  const admin = JSON.parse(stored);
  const initials = (admin.fullName||'A').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('admin-avatar').textContent = initials;
  document.getElementById('admin-name').textContent = admin.fullName || admin.email;

  const headers = { 'Authorization': `Bearer ${token}` };
  try {
    const [dRes, wRes] = await Promise.all([
      fetch(`${API}/api/admin/deposits`, { headers }),
      fetch(`${API}/api/admin/withdrawals`, { headers })
    ]);
    allDeposits = dRes.ok ? (await dRes.json()) : [];
    allWithdrawals = wRes.ok ? (await wRes.json()) : [];
  } catch(e) {
    allDeposits = []; allWithdrawals = [];
  }
  renderOverview();
  renderDep();
  renderWit();
}

init();
</script>
